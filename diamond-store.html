<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Diamond Store — Vlad Woodham-Smith</title>

  <style>
    @font-face {
      font-family: 'Apercu Pro';
      src: url('font/ApercuPro-Regular.woff2') format('woff2'),
           url('font/ApercuPro-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Apercu Pro';
      src: url('font/ApercuPro-Medium.woff2') format('woff2'),
           url('font/ApercuPro-Medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000;
      min-height: 100vh;
      font-family: 'Apercu Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 400;
      color: #ffffff;
      overflow-x: hidden;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #000000;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 28px 32px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    .wordmark {
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-decoration: none;
    }

    .wordmark-name {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1;
    }

    .wordmark-sub {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #aaaaaa;
      line-height: 1;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
      padding-top: 1px;
    }

    .nav-links a {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #aaaaaa;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #ff0000; }
    .nav-links a.active { color: #ffffff; }

    .project-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 52px 32px 0;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s ease 0.1s forwards;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .project-title {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #aaaaaa;
      margin-bottom: 32px;
    }

    .instagram-wrap {
      display: flex;
      gap: 0;
      align-items: flex-start;
      width: 100%;
    }

    .instagram-wrap .instagram-media {
      flex: 1;
      min-width: 0 !important;
      max-width: none !important;
      margin: 0 !important;
    }

    footer {
      padding: 24px 32px;
      margin-top: 64px;
      border-top: 0.5px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer span {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: #444444;
    }

    @media (max-width: 768px) {
      nav { padding: 20px; }
      .project-content { padding: 36px 20px 0; }
      .instagram-wrap { flex-direction: column; }
      footer { padding: 20px; flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="wordmark">
      <span class="wordmark-name">Vlad Woodham-Smith</span>
      <span class="wordmark-sub">cinematographer</span>

    <ul class="nav-links">
      <li><a href="index.html" class="active">moving image</a></li>
      <li><a href="stills.html">stills</a></li>
      <li><a href="info.html">info</a></li>
    </ul>
  </nav>

  <div class="project-content">

    <p class="project-title">the diamond store — seasonal campaigns</p>

    <div class="instagram-wrap">

      </blockquote>
      <blockquote

        style="background:#FFF; border:0; margin:0; padding:0; width:100%;">
        <a href="https://www.instagram.com/p/DVs5qPbiPq_/" target="_blank" rel="noopener">view on instagram</a>
      </blockquote>
      <blockquote
        class="instagram-media"
        data-instgrm-permalink="https://www.instagram.com/p/DVyNceKiAWe/?utm_source=ig_embed&amp;utm_campaign=loading"

  </div>

  <footer>
    <span>© vlad woodham-smith. 2026.</span>
  </footer>

</body>
</html>
