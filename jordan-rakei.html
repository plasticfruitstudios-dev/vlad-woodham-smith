<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jordan Rakei — Vlad Woodham-Smith</title>

  <style>
    @font-face {
      font-family: 'Apercu Pro';
      src: url('font/ApercuPro-Regular.woff2') format('woff2'),
           url('font/ApercuPro-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Apercu Pro';
      src: url('font/ApercuPro-Medium.woff2') format('woff2'),
           url('font/ApercuPro-Medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000;
      min-height: 100vh;
      font-family: 'Apercu Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 400;
      color: #ffffff;
      overflow-x: hidden;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #000000;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 28px 32px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    .wordmark {
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-decoration: none;
    }

    .wordmark-name {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1;
    }

    .wordmark-sub {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #aaaaaa;
      line-height: 1;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
      padding-top: 1px;
    }

    .nav-links a {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #aaaaaa;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #ff0000; }
    .nav-links a.active { color: #ffffff; }

    .project-content {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s ease 0.1s forwards;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .project-title {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #aaaaaa;
      padding: 36px 32px 0;
      margin-bottom: 28px;
    }

    .video-centred {
      display: flex;
      justify-content: center;
      margin-bottom: 3px;
    }

    .video-centred-inner {
      position: relative;
      width: 50%;
      padding-top: 28.125%; /* 56.25% of 50% */
      background: #111;
    }

    .video-centred-inner video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin-bottom: 0;
    }

    .grid-item {
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .grid-item img {
      width: 100%;
      height: auto;
      display: block;
      aspect-ratio: 3 / 2;
      object-fit: cover;
      transition: filter 0.3s ease, transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .grid-item:hover img {
      filter: brightness(0.55);
      transform: scale(1.02);
    }

    .view-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .grid-item:hover .view-hint { opacity: 1; }

    .view-hint span {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #ffffff;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 88vw; max-height: 88vh; object-fit: contain; display: block; }

    #lb-close {
      position: fixed;
      top: 28px;
      right: 36px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #ffffff;
      opacity: 0.45;
      cursor: pointer;
      transition: opacity 0.2s;
      user-select: none;
    }
    #lb-close:hover { opacity: 1; }

    #lb-prev, #lb-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #ffffff;
      opacity: 0.4;
      cursor: pointer;
      transition: opacity 0.2s;
      user-select: none;
    }
    #lb-prev { left: 36px; }
    #lb-next { right: 36px; }
    #lb-prev:hover, #lb-next:hover { opacity: 1; }

    footer {
      padding: 24px 32px;
      margin-top: 64px;
      border-top: 0.5px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer span {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: #444444;
    }

    @media (max-width: 768px) {
      nav { padding: 20px; }
      .project-title { padding: 28px 20px 0; }
      .video-centred-inner { width: 90%; padding-top: 50.625%; }
      .photo-grid { grid-template-columns: 1fr; }
      footer { padding: 20px; flex-direction: column; gap: 8px; text-align: center; }
      #lb-prev { left: 16px; }
      #lb-next { right: 16px; }
      #lb-close { top: 16px; right: 20px; }
    }
  </style>
</head>
<body>

  <div id="lightbox">
    <span id="lb-close">close</span>
    <span id="lb-prev">← prev</span>
    <img id="lb-img" src="" alt="" />
    <span id="lb-next">next →</span>
  </div>

  <nav>
    <a href="index.html" class="wordmark">
      <span class="wordmark-name">Vlad Woodham-Smith</span>
      <span class="wordmark-sub">cinematographer</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">moving image</a></li>
      <li><a href="stills.html">stills</a></li>
      <li><a href="info.html">info</a></li>
    </ul>
  </nav>

  <div class="project-content">

    <p class="project-title">jordan rakei — live at abbey road (directed by dylan friese-greene)</p>

    <div class="video-centred">
      <div class="video-centred-inner">
        <video src="videos/jordan-cutdown.webm" autoplay controls loop muted playsinline></video>
      </div>
    </div>

    <div class="photo-grid">
      <div class="grid-item">
        <img src="images/jordan-rakei/jordan-1.jpg" loading="lazy" alt="Jordan Rakei — Abbey Road" />
        <div class="view-hint"><span>view</span></div>
      </div>
      <div class="grid-item">
        <img src="images/jordan-rakei/jordan-2.jpg" loading="lazy" alt="Jordan Rakei — Abbey Road" />
        <div class="view-hint"><span>view</span></div>
      </div>
      <div class="grid-item">
        <img src="images/jordan-rakei/jordan-3.jpg" loading="lazy" alt="Jordan Rakei — Abbey Road" />
        <div class="view-hint"><span>view</span></div>
      </div>
      <div class="grid-item">
        <img src="images/jordan-rakei/jordan-4.jpg" loading="lazy" alt="Jordan Rakei — Abbey Road" />
        <div class="view-hint"><span>view</span></div>
      </div>
    </div>

    <div class="video-centred">
      <div class="video-centred-inner">
        <video src="videos/jordan-cutdown-2.webm" autoplay controls loop muted playsinline></video>
      </div>
    </div>

  </div>

  <footer>
    <span>© vlad woodham-smith. 2026.</span>
  </footer>

  <script>
    const lbItems = Array.from(document.querySelectorAll('.photo-grid .grid-item img'));
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    let lbCurrent = 0;

    function lbOpen(i) { lbCurrent = i; lbImg.src = lbItems[i].src; lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
    function lbClose() { lb.classList.remove('open'); lbImg.src = ''; document.body.style.overflow = ''; }

    document.querySelectorAll('.photo-grid .grid-item').forEach((el, i) => el.addEventListener('click', () => lbOpen(i)));
    document.getElementById('lb-close').addEventListener('click', lbClose);
    lb.addEventListener('click', e => { if (e.target === lb) lbClose(); });
    document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); lbCurrent = (lbCurrent - 1 + lbItems.length) % lbItems.length; lbImg.src = lbItems[lbCurrent].src; });
    document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); lbCurrent = (lbCurrent + 1) % lbItems.length; lbImg.src = lbItems[lbCurrent].src; });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') lbClose();
      if (e.key === 'ArrowLeft') document.getElementById('lb-prev').click();
      if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
    });
  </script>

</body>
</html>
