<head>

  <title>Stills — Vlad Woodham-Smith</title>

  <style>
    @font-face {
      font-family: 'Apercu Pro';
      src: url('font/ApercuPro-Regular.woff2') format('woff2'),
           url('font/ApercuPro-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Apercu Pro';
      src: url('font/ApercuPro-Medium.woff2') format('woff2'),
           url('font/ApercuPro-Medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000;
      min-height: 100vh;
      font-family: 'Apercu Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 400;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }

    #lb-img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      display: block;
      transition: opacity 0.2s ease;
    }
    #lb-img.fading { opacity: 0; }

    #lb-close {
      position: fixed;
      top: 28px;
      right: 36px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #ffffff;
      opacity: 0.45;
      cursor: pointer;
      transition: opacity 0.2s;
      user-select: none;
    }
    #lb-close:hover { opacity: 1; }

    #lb-prev, #lb-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #ffffff;
      opacity: 0.4;
      cursor: pointer;
      transition: opacity 0.2s;
      user-select: none;
    }
    #lb-prev { left: 36px; }
    #lb-next { right: 36px; }
    #lb-prev:hover, #lb-next:hover { opacity: 1; }

    #lb-counter {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #ffffff;
      opacity: 0.3;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #000000;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 28px 32px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    .wordmark {
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-decoration: none;
    }

    .wordmark-name {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1;
    }

    .wordmark-sub {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #aaaaaa;
      line-height: 1;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
      padding-top: 1px;
    }

    .nav-links a {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #aaaaaa;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #ff0000; }
    .nav-links a.active { color: #ffffff; }

    /* ── Grid ── */
    .stills-grid {
      padding: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      line-height: 0;
      font-size: 0;
    }

    .still-item {
      overflow: hidden;
      position: relative;
      display: block;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    /* Padding-top trick: locks to 4:5 portrait ratio cross-browser */
    .still-item::before {
      content: '';
      display: block;
      padding-top: 125%;
    }

    .still-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .still-item img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.35s ease;
    }

    .still-item:hover img {
      transform: scale(1.03);
      filter: brightness(0.6);
    }

    .view-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .still-item:hover .view-hint { opacity: 1; }

    .view-hint span {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #ffffff;
    }

    /* ── Footer ── */
    footer {
      padding: 24px 32px;
      border-top: 0.5px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0;
    }

    footer span {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: #444444;
    }

    @media (max-width: 768px) {
      nav { padding: 20px; }
      .stills-grid { grid-template-columns: repeat(2, 1fr); }
      footer { padding: 20px; flex-direction: column; gap: 8px; text-align: center; }
      #lb-prev { left: 16px; }
      #lb-next { right: 16px; }
      #lb-close { top: 16px; right: 20px; }
    }

    @media (max-width: 480px) {
      .stills-grid { grid-template-columns: 1fr; }
      .nav-links { gap: 18px; }
    }
  </style>
</head>

  <script>
    // Staggered reveal
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 50);
          obs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05 });
    document.querySelectorAll('.still-item').forEach(el => obs.observe(el));

    // Lightbox
    const imgs = Array.from(document.querySelectorAll('.still-item img'));
    const lb    = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');
    let current = 0;

    function updateCounter() {
      lbCounter.textContent = (current + 1) + ' / ' + imgs.length;
    }

    function openLightbox(i) {
      current = i;
      lbImg.src = imgs[i].src;
      updateCounter();
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lb.classList.remove('open');
      lbImg.src = '';
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      current = (current + dir + imgs.length) % imgs.length;
      lbImg.classList.add('fading');
      setTimeout(() => {
        lbImg.src = imgs[current].src;
        updateCounter();
        lbImg.classList.remove('fading');
      }, 150);
    }

    document.querySelectorAll('.still-item').forEach((el, i) =>
      el.addEventListener('click', () => openLightbox(i))
    );
    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
    document.getElementById('lb-next').addEventListener('click', () => navigate(1));

    // Click outside image to close
    lb.addEventListener('click', (e) => {
      if (e.target === lb) closeLightbox();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   navigate(-1);
      if (e.key === 'ArrowRight')  navigate(1);
    });
  </script>
